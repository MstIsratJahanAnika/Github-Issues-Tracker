<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Issues</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="min-h-screen bg-[#F8FAFC]">
    <header>
        <!-- navbar start -->
        <div class="navbar bg-base-100 shadow-sm px-15 mx-auto bg-[#FFFFFF]">
            <div class="flex-1">
                <div class="flex gap-2">
                    <span class="text-2xl"><i class="fa-brands fa-github"></i></span>
                    <p class="font-semibold text-2xl">GitHub Issues Tracker</p>
                </div>
            </div>
            <div class="flex gap-4">

                <!-- search field -->
                <div>
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>
                </div>

                <!-- new issues button -->
                <button class="btn btn-soft btn-primary hover:text-white"><span><span><i
                                class="fa-solid fa-plus"></i></span> </span>New Issue</button>
            </div>
        </div>
        <!-- navbar end -->
    </header>

    <main>
        <section class="w-9/12 mx-auto my-[60px] rounded-lg">
            <div class="py-6 mb-4 bg-[#FFFFFF] shadow rounded-lg">
                <div class="flex justify-start items-center p-6 gap-2">
                    <button id="allIssueBtn" class="active-btn w-[120px] py-2 px-3 rounded-sm" onclick="selectBtnCategory('All', this)">All</button>
                   
                    <div id="btns-Container" class="flex items-center gap-2">
                        <!-- <button class="text-[#64748B] w-[120px] py-2 px-3 border border-[#E4E4E7] rounded-sm">Open</button>
                        <button class="text-[#64748B] w-[120px] py-2 px-3 border border-[#E4E4E7] rounded-sm">Closed</button> -->
                    </div>
                </div>
            </div>
            <div>
                <!-- card container div -->
                <div>
                    <!-- number of issues start -->
                    <div class="p-6 flex justify-between items-center bg-[#FFFFFF] shadow border-b border-[#E4E4E7]">
                        <div class="flex justify-start items-center gap-2">
                            <div class=" p-[9px] rounded-[50%] bg-[#ECE4FF]">
                                <img src="./assets/Aperture.png" alt="">
                            </div>
                            <div>
                                <h4 class="font-semibold text-[20px]">50 Issues</h4>
                                <p class="text-[#64748B]">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex justify-end items-center gap-4">
                            <span class="flex items-center gap-2"><span class="text-[#00A96E]"><i
                                        class="fa-solid fa-circle"></i></span>
                                <p> Open</p>
                            </span>

                            <span class="flex items-center gap-2"><span class="text-[#A855F7]"><i
                                        class="fa-solid fa-circle"></i></span>
                                <p> Closed</p>
                            </span>

                        </div>
                    </div>
                    <!-- number of issues end -->

                    <!-- all cards -->
                    <div id="all-issuesContainer">
                        <div class="bg-[#FBFBFB] p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
                            <!-- card -->
                            <div class="shadow">
                                <div class="border-t-[3px] border-t-[#00A96E] rounded-sm p-4  space-y-4">
                                    <div class="flex justify-between items-center">
                                        <span><img src="./assets/Open-Status.png" alt=""></span>
                                        <span
                                            class="rounded-[100px] bg-[#FEECEC] text-[#EF4444] py-1.5 px-[25px]">HIGH</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h3>
                                        <p class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse
                                            properly
                                            on mobile devices...</p>
                                    </div>
                                    <div class="flex justify-start items-center gap-1">
                                        <button
                                            class="py-1.5 px-2 flex justify-start items-center text-[#EF4444] bg-[#FEECEC] text-[12px] rounded-[100px] border border-[#EF4444]/30 gap-0.5"><span
                                                class=""><img src="./assets/bug.png" alt=""></span> BUG</button>
                                        <button
                                            class="py-1.5 px-2 flex justify-start items-center text-[#D97706] bg-[#FFF8DB] text-[12px] rounded-[100px] border border-[#D97706]/30 gap-0.5"><span><img
                                                    src="./assets/help-wanted.png" alt=""></span> HELP WANTED</button>
                                    </div>

                                </div>
                                <div class="border-t border-[#E4E4E7] p-4 text-[12px] space-y-2 text-[#64748B]">
                                    <p>#1 by john_doe</p>
                                    <p>1/15/2024</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- loading spinner -->
                    <div id="loading-spinner" class="flex justify-center items-center">
                        <span class="loading loading-spinner loading-xl"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- script -->
    <script src="./scripts/main.js"></script>
</body>

</html>
