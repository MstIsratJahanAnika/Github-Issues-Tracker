<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Issues</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="min-h-screen bg-[#F8FAFC]">
    <header>
        <!-- navbar start -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>

                    <!-- responsive er dropdown -->
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li><a class="btn btn-ghost"><span><i class="fa-solid fa-plus"></i></span> New Issues</a></li>
                    </ul>
                </div>
                <a class="btn btn-ghost text-xl">
                    <div class="flex gap-2">
                        <span class="text-2xl"><i class="fa-brands fa-github"></i></span>
                        <p class="font-semibold text-2xl hidden md:flex">GitHub Issues Tracker</p>
                    </div>
                </a>
            </div>
             
            <div class="navbar-end gap-4">

                <!-- search input -->
                <div class="join">
                    <div>

                        <!-- search bar -->
                        <label class="input validator join-item flex items-center gap-2">
                            <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                            <input type="email" placeholder="Search issues..." required />
                        </label>
                        <div class="validator-hint hidden">Enter valid Issue</div>
                    </div>
                    <button class="btn btn-primary btn-active join-item">Search</button>
                </div>

                <!-- new issues button -->
                 <div class="hidden md:flex">
                     <button class="btn btn-soft btn-primary hover:text-white"><span><span><i
                                     class="fa-solid fa-plus"></i></span> </span>New Issue</button>
                 </div>
            </div>
        </div>
        <!-- navbar end -->
    </header>

    <main>
        <section class="w-9/12 mx-auto my-[60px]">
            <div class="py-6 mb-4 bg-[#FFFFFF] shadow rounded-lg">

                <!-- buttons div -->
                <div class="flex justify-start items-center p-6 gap-2">

                    <!-- buttons - click korle issues load hobe -->
                    <button id="allIssueBtn" class="active-btn w-[120px] py-2 px-3 rounded-sm"
                        onclick="selectBtnCategory('All',this)">All</button>

                    <div id="btns-container" class="flex items-center gap-2">
                        <!-- <button class="text-[#64748B] w-[120px] py-2 px-3 border border-[#E4E4E7] rounded-sm">Open</button>
                        <button class="text-[#64748B] w-[120px] py-2 px-3 border border-[#E4E4E7] rounded-sm">Closed</button> -->
                    </div>
                </div>
            </div>
            <div class="rounded-lg">
                <!-- card container div -->
                <div class="shadow">
                    <!-- number of issues start -->
                    <div class="p-6 flex flex-col md:flex-row space-y-10 md:space-y-0 md:justify-between items-center bg-[#FFFFFF] shadow border-b border-[#E4E4E7]">
                        <div class="flex justify-start items-center gap-2">
                            <div class=" p-[9px] rounded-[50%] bg-[#ECE4FF]">
                                <img src="./assets/Aperture.png" alt="">
                            </div>
                            <div>
                                <h4 id="total-NumberIssues" class="font-semibold text-[20px]">50 Issues</h4>
                                <p class="text-[#64748B]">Track and manage your project issues</p>
                            </div>
                        </div>
                        <div class="flex justify-end items-center gap-4">
                            <span class="flex items-center gap-2"><span class="text-[#00A96E]"><i
                                        class="fa-solid fa-circle"></i></span>
                                <p> Open</p>
                            </span>

                            <span class="flex items-center gap-2"><span class="text-[#A855F7]"><i
                                        class="fa-solid fa-circle"></i></span>
                                <p> Closed</p>
                            </span>

                        </div>
                    </div>
                    <!-- number of issues end -->

                    <!-- all cards -->
                    <!-- <div > -->
                    <div id="all-issuesContainer"
                        class="bg-[#FBFBFB] p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mx-auto">
                        <!-- card -->
                        <div class="text-center">
                            <!-- <div class="border-t-[3px] border-t-[#00A96E]  rounded-sm p-4  space-y-4">
                                <div class="flex justify-between items-center">
                                    <span><img src="./assets/Open-Status.png" alt=""></span>
                                    <span
                                        class="rounded-[100px] bg-[#FEECEC] text-[#EF4444] py-1.5 px-[25px]">HIGH</span>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h3>
                                    <p class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse
                                        properly
                                        on mobile devices...</p>
                                </div>
                                <div class="flex justify-start items-center gap-1">
                                    <button
                                        class="py-1.5 px-2 flex justify-start items-center text-[#EF4444] bg-[#FEECEC] text-[12px] rounded-[100px] border border-[#EF4444]/30 gap-0.5"><span
                                            class=""><img src="./assets/bug.png" alt=""></span> BUG</button>
                                    <button
                                        class="py-1.5 px-2 flex justify-start items-center text-[#D97706] bg-[#FFF8DB] text-[12px] rounded-[100px] border border-[#D97706]/30 gap-0.5"><span><img
                                                src="./assets/help-wanted.png" alt=""></span> HELP WANTED</button>
                                </div>

                            </div> -->
                            <!-- <div>
                                <div class="border-t border-[#E4E4E7] p-4 text-[12px] space-y-2 text-[#64748B]">
                                    <p>#1 by john_doe</p>
                                    <p>1/15/2024</p>
                                </div>
                            </div> -->
                        </div>

                    </div>
                    <!-- </div> -->

                    <!-- loading spinner -->
                    <div id="loading-spinner" class="flex justify-center items-center">
                        <span class="loading loading-spinner loading-xl"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>

    <!-- script -->
    <script src="./scripts/main.js"></script>
</body>

</html>
