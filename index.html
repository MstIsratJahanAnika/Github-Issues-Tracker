<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="">
    <main>
        <!-- login section -->
        <form action="" id="login-form">
            <section class="bg-[#F8FAFC] flex justify-center items-center min-h-screen">

                <div class="w-1/2 md:w-1/3 p-8 mx-auto shadow-lg bg-[#FFFFFF] rounded-lg">
                    <div class="text-center">
                        <div class="w-full flex justify-center">
                            <img src="./assets/github-logo.png" alt="">
                        </div>
                        <h1 class="font-semibold text-[24px]">GitHub Issues Tracker</h1>
                        <p class="text-[#64748B]">Sign in to manage your issues</p>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <p>Username</p>
                            <input type="text" name="" id="userName" placeholder="Enter Username"
                                class="p-4 rounded-lg border border-[#64748B]/20 w-full">
                            <p class="text-[#4A00FF]">Default: admin</p>
                        </div>
                        <div class="space-y-2">
                            <p>Password</p>
                            <input type="password" name="" id="userPassword" placeholder="Enter Password"
                                class="p-4 rounded-lg border border-[#64748B]/20 w-full">
                            <p class="text-[#4A00FF]">Default: admin123</p>
                        </div>
                    </div>

                    <!-- ekhane click korle main page open hobe -->
                    <div><button type="submit" class="btn btn-soft btn-primary w-full my-6 rounded-lg">Sign In</button>
                    </div>

                    <div class="flex items-center gap-3 space-y-6">
                        <span class="flex-1 border border-[#64748B]/20"></span>
                        <span>OR</span>
                        <span class="flex-1 border border-[#64748B]/20"></span>
                    </div>
                    <div class="text-center">
                        <p class="text-[14px] mb-2">Demo Credentials:</p>
                        <div class="py-6 bg-[#F8FAFC] rounded-lg">
                            <p><span class="font-semibold">Username:</span> admin</p>
                            <p><span class="font-semibold">Password:</span> admin123</p>
                        </div>
                    </div>
                </div>

            </section>
        </form>
    </main>
    <script src="./scripts/index.js"></script>
</body>

</html>
